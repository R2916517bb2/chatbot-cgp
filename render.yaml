services:
  - type: web
    name: pdf-qa-system
    runtime: python3
    buildCommand: "./build.sh"
    startCommand: "python app.py"
    plan: starter  # or 'free' for free tier
    
    # Environment variables
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false  # Set this in Render dashboard
      - key: PASSWORD
        value: "654321"  # Change this in production
    
    # Health check
    healthCheckPath: /status
    
    # Auto-deploy settings
    branch: main  # or your default branch
    
    # Disk storage for uploads (optional)
    disk:
      name: pdf-uploads
      mountPath: /tmp
      sizeGB: 1